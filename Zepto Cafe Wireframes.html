document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8px 40px;border-bottom:1px solid rgba(0,0,0,.08);scroll-margin-top:16px}\n  .dv-thd{display:flex;align-items:baseline;gap:12px;margin:0 0 8px}\n  .dv-tid{font:700 11px ui-monospace,Menlo,monospace;padding:4px 8px;background:#1f1c18;color:#fff;border-radius:5px;text-decoration:none}\n  .dv-tname{font:700 18px/1.2 'Kalam',sans-serif;color:#1f1c18}\n  .dv-sub{font:400 13px/1.5 ui-monospace,Menlo,monospace;color:rgba(0,0,0,.5);margin:0 0 26px;max-width:760px}\n  .grp-hd{display:flex;align-items:center;gap:12px;margin:34px 0 18px}\n  .grp-tag{font:700 12px ui-monospace,Menlo,monospace;letter-spacing:.04em;padding:5px 11px;background:#e4dfd4;border:1.5px solid #1f1c18;border-radius:6px}\n  .grp-ttl{font:700 20px/1.1 'Kalam',sans-serif}\n  .grp-note{font:400 13px ui-monospace,Menlo,monospace;color:rgba(0,0,0,.45)}\n  .row{display:flex;flex-wrap:wrap;gap:32px;align-items:flex-start}\n\n  /* scenario cell = phone + annotation */\n  .cell{flex:none;display:flex;gap:18px;align-items:flex-start;scroll-margin-top:16px;padding:16px;background:rgba(255,255,255,.35);border:1px dashed rgba(0,0,0,.16);border-radius:14px}\n  .cid{position:absolute;top:-11px;left:14px;font:700 11px ui-monospace,Menlo,monospace;padding:3px 8px;background:#1f1c18;color:#fff;border-radius:5px}\n\n  /* phone */\n  .ph{position:relative;width:236px;height:474px;background:#fff;border:2.5px solid #1f1c18;border-radius:30px;padding:9px;flex:none;box-shadow:5px 6px 0 rgba(0,0,0,.09)}\n  .ph-scr{width:100%;height:100%;border:1.5px solid rgba(0,0,0,.14);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;background:#faf8f4}\n  .notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:74px;height:15px;background:#1f1c18;border-radius:0 0 11px 11px;z-index:3}\n  .sb{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 4px;font:700 9px ui-monospace,monospace;color:rgba(0,0,0,.55);flex:none}\n  .scr-body{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:9px;overflow:hidden}\n  .scr-hd{font:700 14px 'Kalam',sans-serif;display:flex;align-items:center;gap:6px}\n  .nav{flex:none;display:flex;justify-content:space-around;align-items:center;padding:9px 0;border-top:1.5px solid rgba(0,0,0,.12);background:#f2efe8}\n  .nav i{width:20px;height:20px;border:1.5px solid rgba(0,0,0,.35);border-radius:5px;display:block}\n  .nav i.on{border-color:#1f1c18;background:#e4dfd4}\n\n  /* wireframe primitives */\n  .box{background:repeating-linear-gradient(45deg,#e7e3da,#e7e3da 6px,#ddd8cd 6px,#ddd8cd 12px);border:1.5px solid rgba(0,0,0,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font:700 9px ui-monospace,monospace;color:rgba(0,0,0,.42);text-align:center}\n  .ln{height:9px;background:#d9d4c9;border-radius:4px}\n  .ln.sh{width:55%}.ln.md{width:75%}\n  .pill{align-self:flex-start;font:700 8.5px ui-monospace,monospace;padding:3px 8px;border:1.3px solid rgba(0,0,0,.3);border-radius:20px;color:rgba(0,0,0,.55)}\n  .btn{border:2px solid #1f1c18;border-radius:11px;padding:10px;text-align:center;font:700 12px 'Kalam',sans-serif;background:#fff}\n  .btn.pri{background:#f2b53c;box-shadow:2px 3px 0 #1f1c18}\n  .btn.gho{border-style:dashed;background:transparent;color:rgba(0,0,0,.6)}\n  .rcard{border:2px solid #1f1c18;border-radius:14px;padding:9px;display:flex;flex-direction:column;gap:7px;background:#fff;box-shadow:2px 3px 0 rgba(0,0,0,.12)}\n  .rcard .top{display:flex;gap:9px;align-items:center}\n  .rcard .top .box{width:46px;height:46px;flex:none;border-radius:9px}\n  .rcard .meta{flex:1;display:flex;flex-direction:column;gap:6px}\n  .toast{align-self:center;background:#1f1c18;color:#fff;font:700 10px 'Kalam',sans-serif;padding:7px 13px;border-radius:20px;display:flex;align-items:center;gap:6px}\n  .tick{width:15px;height:15px;border-radius:50%;border:2px solid #f2b53c;display:flex;align-items:center;justify-content:center;font-size:8px;color:#f2b53c}\n  .modal{position:absolute;left:9px;right:9px;bottom:9px;background:#fff;border:2px solid #1f1c18;border-radius:16px 16px 22px 22px;padding:12px;display:flex;flex-direction:column;gap:9px;z-index:4;box-shadow:0 -6px 16px rgba(0,0,0,.14)}\n  .dim{position:absolute;inset:9px;background:rgba(20,18,15,.32);border-radius:22px;z-index:2}\n  .spacer{flex:1}\n  .warn{border:1.6px solid rgba(0,0,0,.4);border-radius:8px;padding:7px 9px;font:700 9px ui-monospace,monospace;color:rgba(0,0,0,.55);display:flex;gap:6px;align-items:center;background:#f6f2e9}\n\n  /* lock screen / notification */\n  .lock{flex:1;background:#2a2438;display:flex;flex-direction:column;align-items:center;padding:22px 12px;gap:12px}\n  .lock .clk{color:#efe9dc;font:700 34px 'Kalam',sans-serif;text-align:center;line-height:1}\n  .lock .dt{color:rgba(255,255,255,.6);font:700 9px ui-monospace,monospace;margin-top:-6px}\n  .push{width:100%;background:rgba(255,255,255,.94);border-radius:13px;padding:9px;display:flex;gap:8px;align-items:flex-start;box-shadow:0 3px 8px rgba(0,0,0,.25)}\n  .push .ic{width:26px;height:26px;border-radius:7px;background:#f2b53c;border:1.5px solid #1f1c18;flex:none;display:flex;align-items:center;justify-content:center;font:700 12px 'Kalam',sans-serif}\n  .push .pb{flex:1;display:flex;flex-direction:column;gap:4px}\n  .push .pt{font:700 10px 'Kalam',sans-serif}\n  .push .pd{font:400 9.5px 'Kalam',sans-serif;color:rgba(0,0,0,.62);line-height:1.25}\n  .toggle{display:flex;align-items:center;justify-content:space-between;border:1.5px solid rgba(0,0,0,.2);border-radius:10px;padding:9px 10px;background:#fff}\n  .toggle .lbl{font:700 10px 'Kalam',sans-serif}\n  .sw{width:34px;height:19px;border-radius:20px;flex:none;position:relative;border:1.5px solid #1f1c18}\n  .sw.on{background:#f2b53c}.sw.off{background:#e2ddd2}\n  .sw::after{content:\"\";position:absolute;top:1.5px;width:13px;height:13px;border-radius:50%;background:#1f1c18}\n  .sw.on::after{right:2px}.sw.off::after{left:2px}\n\n  /* annotation */\n  .ann{width:296px;flex:none;display:flex;flex-direction:column;gap:9px;padding-top:4px}\n  .ann .frid{align-self:flex-start;font:700 11px ui-monospace,monospace;padding:4px 9px;background:#3a2f52;color:#efe9dc;border-radius:5px}\n  .ann h4{margin:0;font:700 15px/1.2 'Kalam',sans-serif}\n  .story{font:400 12.5px/1.45 'Kalam',sans-serif;color:#2a2620;border-left:3px solid #f2b53c;padding-left:10px}\n  .gwt{border:1.4px dashed rgba(0,0,0,.28);border-radius:10px;padding:10px 11px;font:400 11px/1.5 ui-monospace,Menlo,monospace;color:rgba(0,0,0,.66);background:rgba(255,255,255,.5)}\n  .gwt b{color:#1f1c18;font-weight:700}\n  .gwt .k{color:#8a6d1e;font-weight:700}\n  .gwt+.gwt{margin-top:-2px}\n  .gwtlbl{font:700 9px ui-monospace,monospace;letter-spacing:.06em;color:rgba(0,0,0,.4);text-transform:uppercase;margin-bottom:3px}\n\n  /* flow map */\n  .flow{display:flex;flex-direction:column;gap:26px;background:rgba(255,255,255,.4);border:1.4px dashed rgba(0,0,0,.18);border-radius:16px;padding:24px 22px}\n  .flane{display:flex;align-items:center;gap:0;flex-wrap:wrap}\n  .flab{font:700 12px ui-monospace,monospace;padding:5px 10px;background:#3a2f52;color:#efe9dc;border-radius:6px;margin-right:14px;flex:none}\n  .fnode{font:700 11.5px 'Kalam',sans-serif;padding:10px 13px;border:2px solid #1f1c18;border-radius:11px;background:#fff;text-align:center;max-width:132px;box-shadow:2px 2px 0 rgba(0,0,0,.1)}\n  .fnode.tr{background:#f2b53c}\n  .fnode.dec{background:#e4dfd4;border-style:dashed;border-radius:11px}\n  .fnode.end{background:#1f1c18;color:#fff}\n  .farr{font:700 18px ui-monospace,monospace;color:rgba(0,0,0,.45);padding:0 9px;flex:none}\n  .fbranch{font:700 9px ui-monospace,monospace;color:rgba(0,0,0,.5);border:1.3px dashed rgba(0,0,0,.3);border-radius:7px;padding:7px 9px;background:rgba(255,255,255,.6);max-width:130px}\n  .fcol{display:flex;flex-direction:column;gap:8px;align-items:center}\n  .merge{font:700 10px ui-monospace,monospace;color:#8a6d1e}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<section class=\"dv-turn\" id=\"t1\">\n  <div class=\"dv-thd\"><a class=\"dv-tid\" href=\"#t1\">1<\u002Fa><span class=\"dv-tname\">Zepto Cafe — Retention &amp; Habit Loop · Low-fi wireframes<\u002Fspan><\u002Fdiv>\n  <p class=\"dv-sub\">S5 Your Usual Reorder Card (FR-01→04) + S1 Chai O'Clock Push (FR-05→08). Every FR shown as its primary path plus its alternate GIVEN/WHEN/THEN branch. Phone frames are structural only — grey hatch = image/placeholder, amber = primary thumb-zone action.<\u002Fp>\n\n  <!-- ===================== FLOW MAP ===================== -->\n  <div class=\"grp-hd\"><span class=\"grp-tag\">FLOW<\u002Fspan><span class=\"grp-ttl\">Solution user flow — Flow B merges into Flow A<\u002Fspan><\u002Fdiv>\n  <div class=\"flow\">\n    <div class=\"flane\">\n      <span class=\"flab\">FLOW A · S5<\u002Fspan>\n      <span class=\"fnode tr\">Open Zepto Cafe<\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode\">See \"Your Usual\" card <span style=\"font-weight:400;font-size:9px\">(FR-01)<\u002Fspan><\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <div class=\"fcol\"><span class=\"fnode\">Reorder · 1 tap <span style=\"font-weight:400;font-size:9px\">(FR-02)<\u002Fspan><\u002Fspan><span class=\"fbranch\">Cart has items? → Add / Start fresh prompt<\u002Fspan><\u002Fdiv><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode\">Confirm feedback <span style=\"font-weight:400;font-size:9px\">(FR-04)<\u002Fspan><\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode\">Cart screen<\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode end\">Order placed<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"flane\" style=\"padding-left:112px\">\n      <span class=\"fbranch\" style=\"max-width:150px\">FR-03 branch: item unavailable → fall back to 2nd order, else Browse category<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"flane\">\n      <span class=\"flab\">FLOW B · S1<\u002Fspan>\n      <span class=\"fnode tr\">3:45pm trigger <span style=\"font-weight:400;font-size:9px\">(FR-05)<\u002Fspan><\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode\">Deliver push (retry → 4:00pm)<\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode\">Tap notification <span style=\"font-weight:400;font-size:9px\">(FR-06)<\u002Fspan><\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <span class=\"fnode dec\">Logged in?<\u002Fspan><span class=\"farr\">→<\u002Fspan>\n      <div class=\"fcol\"><span class=\"fnode\">Reorder card foreground<\u002Fspan><span class=\"fbranch\">No → login → redirect to card<\u002Fspan><\u002Fdiv><span class=\"farr\">→<\u002Fspan>\n      <span class=\"merge\">↑ joins Flow A at \"Reorder · 1 tap\"<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"flane\" style=\"padding-left:112px\">\n      <span class=\"fbranch\" style=\"max-width:150px\">FR-07 cap: fires once/day · FR-08: opt-out toggle in settings<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== S5 ===================== -->\n  <div class=\"grp-hd\"><span class=\"grp-tag\">S5<\u002Fspan><span class=\"grp-ttl\">Your Usual Reorder Card<\u002Fspan><span class=\"grp-note\">— FR-01 to FR-04<\u002Fspan><\u002Fdiv>\n  <div class=\"row\">\n\n    <!-- FR-01a -->\n    <div class=\"cell\" id=\"s-fr01a\"><span class=\"cid\">FR-01a<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"sb\"><span>3:47<\u002Fspan><span>▤ ▤ ▮<\u002Fspan><\u002Fdiv>\n        <div class=\"scr-body\">\n          <div class=\"scr-hd\">☕ Zepto Cafe<\u002Fdiv>\n          <div class=\"pill\">YOUR USUAL · reordered before<\u002Fdiv>\n          <div class=\"rcard\">\n            <div class=\"top\"><div class=\"box\">ITEM<br>IMG<\u002Fdiv><div class=\"meta\"><div class=\"ln md\"><\u002Fdiv><div class=\"ln sh\"><\u002Fdiv><div class=\"ln\" style=\"width:32%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div class=\"btn pri\">Reorder · ₹— · 1 tap<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ln md\" style=\"margin-top:4px\"><\u002Fdiv>\n          <div class=\"box\" style=\"height:56px\">rest of home feed<\u002Fdiv>\n          <div class=\"spacer\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nav\"><i class=\"on\"><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-01 · Display last order<\u002Fspan>\n        <div class=\"story\">\"As a returning user, I want my last order surfaced on the home screen when I open the app so I can see it without searching.\"<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Primary path<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> ≥1 completed order in last 7 days<br><span class=\"k\">WHEN<\u002Fspan> user opens Zepto Cafe<br><span class=\"k\">THEN<\u002Fspan> card shows <b>name, image, unit price<\u002Fb>, visible without scrolling.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FR-01b -->\n    <div class=\"cell\" id=\"s-fr01b\"><span class=\"cid\">FR-01b<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"sb\"><span>3:47<\u002Fspan><span>▤ ▤ ▮<\u002Fspan><\u002Fdiv>\n        <div class=\"scr-body\">\n          <div class=\"scr-hd\">☕ Zepto Cafe<\u002Fdiv>\n          <div class=\"box\" style=\"height:44px\">search / browse bar<\u002Fdiv>\n          <div class=\"box\" style=\"height:80px\">category rail<\u002Fdiv>\n          <div class=\"box\" style=\"height:70px\">default home feed<\u002Fdiv>\n          <div class=\"warn\" style=\"margin-top:auto\">no reorder card — default state<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nav\"><i class=\"on\"><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-01 · No-card fallback<\u002Fspan>\n        <div class=\"story\">The home nue<\u002Fdiv>\n          <div class=\"box\" style=\"height:34px;width:100%\">phone number<\u002Fdiv>\n          <div class=\"box\" style=\"height:34px;width:100%\">OTP<\u002Fdiv>\n          <div class=\"btn pri\" style=\"width:100%\">Verify &amp; continue<\u002Fdiv>\n          <div class=\"warn\">↳ then redirected to reorder card<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-06 · Expired session<\u002Fspan>\n        <div class=\"story\">A logged-out tap should still end on the reorder card — no order data shown before auth.<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Alternate branch<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> session expired (logged out) on tap<br><span class=\"k\">WHEN<\u002Fspan> the app opens<br><span class=\"k\">THEN<\u002Fspan> show login, then <b>redirect to the reorder card<\u002Fb> after successful auth.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FR-07a -->\n    <div class=\"cell\" id=\"s-fr07a\"><span class=\"cid\">FR-07a<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"lock\">\n          <div class=\"clk\">5:30<\u002Fdiv><div class=\"dt\">FRI · 4 JUL<\u002Fdiv>\n          <div class=\"push\"><div class=\"ic\">☕<\u002Fdiv><div class=\"pb\"><div class=\"pt\">Chai O'Clock ☕<\u002Fdiv><div class=\"pd\">delivered once at 3:47pm today<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"push\" style=\"opacity:.3;border:1.5px dashed rgba(255,255,255,.5);background:transparent;box-shadow:none\"><div class=\"ic\" style=\"background:transparent;color:#fff\">✕<\u002Fdiv><div class=\"pb\"><div class=\"pt\" style=\"color:#fff\">2nd fire suppressed<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.5);font:700 8px ui-monospace,monospace;margin-top:auto\">once per calendar day — tapped, dismissed or ignored<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-07 · Frequency cap<\u002Fspan>\n        <div class=\"story\">\"As a user, I want Chai O'Clock to fire only once a day so I don't feel spammed.\"<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Primary path<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> push already delivered today<br><span class=\"k\">WHEN<\u002Fspan> any retry / duplicate trigger fires same calendar day<br><span class=\"k\">THEN<\u002Fspan> <b>no second notification<\u002Fb> is sent.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FR-07b -->\n    <div class=\"cell\" id=\"s-fr07b\"><span class=\"cid\">FR-07b<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"lock\">\n          <div class=\"clk\">3:46<\u002Fdiv><div class=\"dt\">MON · 7 JUL <span style=\"color:#f2b53c\">· next working day<\u002Fspan><\u002Fdiv>\n          <div class=\"push\"><div class=\"ic\">☕<\u002Fdiv><div class=\"pb\"><div class=\"pt\">Chai O'Clock ☕<\u002Fdiv><div class=\"pd\">Same Filter Coffee as Friday? One tap to reorder.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"color:rgba(255,255,255,.5);font:700 8px ui-monospace,monospace;margin-top:auto\">fires again with UPDATED last-order content<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-07 · Next-day re-fire<\u002Fspan>\n        <div class=\"story\">The cap is per-day, not permanent — the loop repeats each working day with fresh content.<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Alternate branch<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> user tapped &amp; placed an order<br><span class=\"k\">WHEN<\u002Fspan> the next working day's window arrives<br><span class=\"k\">THEN<\u002Fspan> notification fires again with <b>updated last-order<\u002Fb> content.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FR-08a -->\n    <div class=\"cell\" id=\"s-fr08a\"><span class=\"cid\">FR-08a<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"sb\"><span>3:47<\u002Fspan><span>▤ ▤ ▮<\u002Fspan><\u002Fdiv>\n        <div class=\"scr-body\">\n          <div class=\"scr-hd\">‹ Notifications<\u002Fdiv>\n          <div class=\"toggle\"><span class=\"lbl\">Chai O'Clock ☕<\u002Fspan><span class=\"sw on\"><\u002Fspan><\u002Fdiv>\n          <div style=\"font:400 9px 'Kalam',sans-serif;color:rgba(0,0,0,.45);margin-top:-3px\">daily reorder reminder<\u002Fdiv>\n          <div style=\"height:1px;background:rgba(0,0,0,.12);margin:4px 0\"><\u002Fdiv>\n          <div class=\"toggle\"><span class=\"lbl\">Order updates<\u002Fspan><span class=\"sw on\"><\u002Fspan><\u002Fdiv>\n          <div class=\"toggle\"><span class=\"lbl\">Offers &amp; promos<\u002Fspan><span class=\"sw off\"><\u002Fspan><\u002Fdiv>\n          <div class=\"spacer\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nav\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i class=\"on\"><\u002Fi><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-08 · Opt-out toggle<\u002Fspan>\n        <div class=\"story\">\"As a user, I want to turn off Chai O'Clock without affecting my other Zepto notification preferences.\"<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Primary path<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> user is in notification preferences<br><span class=\"k\">WHEN<\u002Fspan> they switch the Chai O'Clock toggle off<br><span class=\"k\">THEN<\u002Fspan> Chai O'Clock stops; <b>all other<\u002Fb> Zepto notification types keep working.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FR-08b -->\n    <div class=\"cell\" id=\"s-fr08b\"><span class=\"cid\">FR-08b<\u002Fspan>\n      <div class=\"ph\"><div class=\"notch\"><\u002Fdiv><div class=\"ph-scr\">\n        <div class=\"sb\"><span>3:47<\u002Fspan><span>▤ ▤ ▮<\u002Fspan><\u002Fdiv>\n        <div class=\"scr-body\">\n          <div class=\"scr-hd\">‹ Notifications<\u002Fdiv>\n          <div class=\"toggle\" style=\"border-color:#f2b53c\"><span class=\"lbl\">Chai O'Clock ☕<\u002Fspan><span class=\"sw on\"><\u002Fspan><\u002Fdiv>\n          <div class=\"warn\" style=\"border-color:#f2b53c\">↻ turned back on → resumes next eligible weekday<\u002Fdiv>\n          <div style=\"height:1px;background:rgba(0,0,0,.12);margin:4px 0\"><\u002Fdiv>\n          <div class=\"toggle\"><span class=\"lbl\">Order updates<\u002Fspan><span class=\"sw on\"><\u002Fspan><\u002Fdiv>\n          <div class=\"spacer\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nav\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i class=\"on\"><\u002Fi><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"ann\">\n        <span class=\"frid\">FR-08 · Resume after opt-in<\u002Fspan>\n        <div class=\"story\">Re-enabling is frictionless and picks the loop back up automatically.<\u002Fdiv>\n        <div><div class=\"gwtlbl\">Alternate branch<\u002Fdiv><div class=\"gwt\"><span class=\"k\">GIVEN<\u002Fspan> user had opted out<br><span class=\"k\">WHEN<\u002Fspan> they switch the toggle back on<br><span class=\"k\">THEN<\u002Fspan> Chai O'Clock <b>resumes from the next eligible weekday<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <p class=\"dv-sub\" style=\"margin:30px 0 0\">17 frames · flow map + 8 FRs × (primary + alternate branch). Try next: \"add the cart / checkout screen from Flow A\", \"show a second layout direction for the reorder card (FR-01a)\", or \"turn these into higher-fidelity Warm Velocity screens\".<\u002Fp>\n<\u002Fsection>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
